<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Cloud Interactif - Causes de la consommation de drogue</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            overflow: hidden;
        }
        .word-cloud {
            position: relative;
            width: 800px;
            height: 500px;
        }
        .word {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s ease, font-size 0.3s ease, color 0.3s ease;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            will-change: transform, font-size, color;
        }
        .word:hover {
            transform: scale(1.1);
        }
        .word.active {
            font-size: 24px !important;
            color: #ff5722 !important;
            transform: scale(1.5);
        }
    </style>
</head>
<body>
    <div class="word-cloud" id="wordCloud">
        <!-- Catégorie 1: Pression sociale -->
        <span class="word" data-category="social" style="font-size: 30px; left: 100px; top: 50px; color: #8B4513;">peer</span>
        <span class="word" data-category="social" style="font-size: 25px; left: 150px; top: 100px; color: #A0522D;">group</span>
        <span class="word" data-category="social" style="font-size: 20px; left: 200px; top: 80px; color: #CD853F;">friends</span>
        <span class="word" data-category="social" style="font-size: 18px; left: 120px; top: 150px; color: #D2691E;">conformity</span>
        <span class="word" data-category="social" style="font-size: 15px; left: 180px; top: 180px; color: #F4A460;">acceptance</span>

        <!-- Catégorie 2: Santé mentale -->
        <span class="word" data-category="mental" style="font-size: 35px; left: 400px; top: 30px; color: #8B0000;">depression</span>
        <span class="word" data-category="mental" style="font-size: 28px; left: 450px; top: 100px; color: #DC143C;">stress</span>
        <span class="word" data-category="mental" style="font-size: 22px; left: 500px; top: 150px; color: #B22222;">loneliness</span>
        <span class="word" data-category="mental" style="font-size: 18px; left: 380px; top: 180px; color: #FF6347;">sadness</span>

        <!-- Catégorie 3: Harcèlement -->
        <span class="word" data-category="harassment" style="font-size: 32px; left: 300px; top: 250px; color: #4B0082;">bullying</span>
        <span class="word" data-category="harassment" style="font-size: 26px; left: 350px; top: 300px; color: #800080;">harassment</span>
        <span class="word" data-category="harassment" style="font-size: 20px; left: 400px; top: 350px; color: #9932CC;">victim</span>
        <span class="word" data-category="harassment" style="font-size: 16px; left: 280px; top: 380px; color: #BA55D3;">cruel</span>

        <!-- Catégorie 4: Environnement -->
        <span class="word" data-category="environment" style="font-size: 28px; left: 600px; top: 50px; color: #228B22;">school</span>
        <span class="word" data-category="environment" style="font-size: 24px; left: 650px; top: 120px; color: #32CD32;">university</span>
        <span class="word" data-category="environment" style="font-size: 18px; left: 580px; top: 180px; color: #90EE90;">classroom</span>
        <span class="word" data-category="environment" style="font-size: 16px; left: 620px; top: 220px; color: #98FB98;">teen</span>

        <!-- Catégorie 5: Comportement -->
        <span class="word" data-category="behavior" style="font-size: 25px; left: 200px; top: 300px; color: #4682B4;">behavior</span>
        <span class="word" data-category="behavior" style="font-size: 20px; left: 250px; top: 350px; color: #5F9EA0;">mean</span>
        <span class="word" data-category="behavior" style="font-size: 18px; left: 150px; top: 400px; color: #7FFFD4;">outcast</span>
        <span class="word" data-category="behavior" style="font-size: 16px; left: 220px; top: 430px; color: #AFEEEE;">different</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordCloud = document.getElementById('wordCloud');
            const words = wordCloud.querySelectorAll('.word');

            const categoryMap = new Map();
            words.forEach(word => {
                const category = word.dataset.category;
                if (!categoryMap.has(category)) {
                    categoryMap.set(category, []);
                }
                categoryMap.get(category).push(word);
            });

            wordCloud.addEventListener('click', (e) => {
                const clickedWord = e.target.closest('.word');
                if (!clickedWord) return;

                const category = clickedWord.dataset.category;
                const categoryWords = categoryMap.get(category);

                words.forEach(word => word.classList.remove('active'));
                categoryWords.forEach(word => word.classList.add('active'));
            });
        });
    </script>
</body>
</html>
